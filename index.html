<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПАПИНА КОРПОРАЦИЯ — Система Управления</title>
    <style>
        :root {
            --primary: #00d2ff; --accent: #ff4757; --gold: #ffc107;
            --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.05); --text: #ffffff;
        }
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a2a6c, transparent 70%);
        }
        header {
            backdrop-filter: blur(20px); background: rgba(11, 20, 30, 0.8);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .glass-panel {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 20px; backdrop-filter: blur(10px); margin-bottom: 20px;
        }
        .btn {
            background: var(--primary); color: #000; border: none; padding: 10px 20px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        .btn-gift { background: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .msg.admin { background: var(--accent); color: white; border-left: 4px solid white; }
        .msg.user { background: var(--glass); margin-left: auto; border-right: 4px solid var(--primary); }

        input, select {
            background: rgba(255,255,255,0.07); border: 1px solid var(--glass);
            color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin: 5px 0; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .rank-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; background: var(--primary); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('shop')" style="font-size:1.8rem; font-weight:900; color:var(--primary); cursor:pointer;">ПАПИНА<span>'</span> КОРП</div>
    <div style="display:flex; gap:15px; align-items:center;">
        <div id="wallet-info" class="hidden" style="color:var(--gold); font-weight:bold;">💰 <span id="my-balance">0</span> ₽</div>
        <button class="btn" onclick="showPage('profile')">Профиль / Чат</button>
    </div>
</header>

<div class="container">
    
    <section id="shop">
        <h1 style="text-align:center; text-transform: uppercase; letter-spacing: 2px;">Витрина Корпорации</h1>
        <div id="product-grid" class="grid"></div>
    </section>

    <section id="profile" class="hidden">
        <div class="glass-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h2 id="user-name-display" style="margin:0">Загрузка...</h2>
                    <span id="user-rank" class="rank-badge">Загрузка...</span>
                </div>
                <button class="btn" onclick="logout()" style="background:var(--accent); color:white;">Выйти</button>
            </div>

            <div id="director-controls" class="hidden" style="margin-top:20px; border-top: 2px solid var(--gold); padding-top:20px;">
                <h3 style="color:var(--gold)">💼 Управление Фондом Подарков</h3>
                <div class="grid">
                    <div class="glass-panel">
                        <h4>Добавить новый товар</h4>
                        <input type="text" id="add-name" placeholder="Название">
                        <input type="number" id="add-price" placeholder="Цена">
                        <button class="btn" style="width:100%" onclick="api.addProduct()">Выставить</button>
                    </div>
                    <div class="glass-panel">
                        <h4>Список сотрудников</h4>
                        <div id="staff-list"></div>
                    </div>
                </div>
            </div>

            <div id="worker-controls" class="hidden" style="margin-top:20px; border: 1px solid var(--primary); padding:15px; border-radius:15px;">
                <h3>🎁 Бонусы от Папина</h3>
                <p>Ваш баланс подарков: <b id="bonus-balance" style="color:var(--gold); font-size:1.5rem;">0</b> ₽</p>
            </div>

            <div class="glass-panel" style="margin-top:20px;">
                <h3>💬 Рабочий чат с Директором</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-input" placeholder="Введите поручение или ответ...">
                    <button class="btn" onclick="api.sendMsg()">Отправить</button>
                </div>
            </div>
        </div>
    </section>

    <section id="auth" class="hidden">
        <div class="glass-panel" style="max-width:400px; margin:auto; text-align:center;">
            <h2>Вход в Корпорацию</h2>
            <input type="text" id="login-u" placeholder="Логин">
            <input type="password" id="login-p" placeholder="Пароль">
            <button class="btn" style="width:100%" onclick="api.login()">Войти</button>
        </div>
    </section>

</div>

<script>
    const DB = {
        getUsers: () => JSON.parse(localStorage.getItem('corp_users')) || {},
        saveUsers: (data) => localStorage.setItem('corp_users', JSON.stringify(data)),
        getProducts: () => JSON.parse(localStorage.getItem('corp_prods')) || [],
        saveProducts: (data) => localStorage.setItem('corp_prods', JSON.stringify(data)),
        getChat: () => JSON.parse(localStorage.getItem('corp_chat')) || [],
        saveChat: (data) => localStorage.setItem('corp_chat', JSON.stringify(data))
    };

    let currentUser = JSON.parse(sessionStorage.getItem('active_user'));
    const RANKS = ["Покупатель", "Новичок", "Профессионал", "Кассир ++", "Главный работник", "Директор магазина"];

    const api = {
        login: () => {
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            if(!u || !p) return;
            let users = DB.getUsers();
            if(!users[u]) {
                users[u] = { pass: p, rank: (u === "Папина") ? 5 : 0, balance: (u === "Папина") ? 1000000000 : 0 };
                DB.saveUsers(users);
            } else if(users[u].pass !== p) return alert("Ошибка доступа!");
            currentUser = { name: u, ...users[u] };
            sessionStorage.setItem('active_user', JSON.stringify(currentUser));
            location.reload();
        },
        addProduct: () => {
            const n = document.getElementById('add-name').value;
            const p = document.getElementById('add-price').value;
            if(!n || !p) return;
            let prods = DB.getProducts();
            prods.push({ id: Date.now(), name: n, price: parseInt(p) });
            DB.saveProducts(prods);
            location.reload();
        },
        sendMsg: () => {
            const text = document.getElementById('chat-input').value;
            if(!text) return;
            let chat = DB.getChat();
            chat.push({ user: currentUser.name, text, role: currentUser.rank });
            DB.saveChat(chat);
            document.getElementById('chat-input').value = '';
            renderChat();
        },
        giveMoney: (name) => {
            const amount = prompt(`Сколько подарить сотруднику ${name}?`);
            if(!amount || isNaN(amount)) return;
            let users = DB.getUsers();
            if(users['Папина'].balance < amount) return alert("В фонде недостаточно средств!");
            users[name].balance += parseInt(amount);
            users['Папина'].balance -= parseInt(amount);
            DB.saveUsers(users);
            alert("Средства переведены из фонда Директора!");
            renderProfile();
        },
        setRank: (name, r) => {
            let users = DB.getUsers();
            users[name].rank = parseInt(r);
            DB.saveUsers(users);
            renderProfile();
        }
    };

    function renderShop() {
        const grid = document.getElementById('product-grid');
        const prods = DB.getProducts();
        const isDirector = currentUser && currentUser.rank === 5;
        grid.innerHTML = prods.map(p => `
            <div class="glass-panel">
                <h3>${p.name}</h3>
                <div style="font-size:1.5rem; color:var(--primary); font-weight:bold;">${p.price} ₽</div>
                <button class="btn" style="width:100%; margin-top:10px;" 
                    ${isDirector ? 'disabled' : ''} 
                    onclick="buyItem(${p.price})">
                    ${isDirector ? 'Вы владелец' : 'Купить'}
                </button>
            </div>
        `).join('');
    }

    function buyItem(price) {
        if(!currentUser) return showPage('auth');
        let users = DB.getUsers();
        if(users[currentUser.name].balance < price) return alert("У вас нет столько подарочных денег!");
        users[currentUser.name].balance -= price;
        DB.saveUsers(users);
        alert("Товар оплачен за счет подарков Директора!");
        location.reload();
    }

    function renderChat() {
        const box = document.getElementById('chat-box');
        box.innerHTML = DB.getChat().map(m => `
            <div class="msg ${m.role === 5 ? 'admin' : 'user'}">
                <small>${m.user} [${RANKS[m.role]}]</small><br>${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function renderProfile() {
        if(!currentUser) return;
        const u = DB.getUsers()[currentUser.name];
        document.getElementById('user-name-display').innerText = currentUser.name;
        document.getElementById('user-rank').innerText = RANKS[u.rank];
        document.getElementById('my-balance').innerText = u.balance.toLocaleString();
        document.getElementById('wallet-info').classList.remove('hidden');

        if(u.rank === 5) {
            document.getElementById('director-controls').classList.remove('hidden');
            const all = DB.getUsers();
            document.getElementById('staff-list').innerHTML = Object.keys(all).filter(n => n !== 'Папина').map(n => `
                <div style="margin-bottom:10px; padding:10px; border-bottom:1px solid #444">
                    <b>${n}</b> [${RANKS[all[n].rank]}]<br>
                    <select onchange="api.setRank('${n}', this.value)">
                        ${RANKS.slice(0, 5).map((r, i) => `<option value="${i}" ${all[n].rank === i ? 'selected' : ''}>${r}</option>`).join('')}
                    </select>
                    <button class="btn btn-gift" onclick="api.giveMoney('${n}')">🎁 Дарить деньги</button>
                </div>
            `).join('');
        } else if(u.rank > 0) {
            document.getElementById('worker-controls').classList.remove('hidden');
            document.getElementById('bonus-balance').innerText = u.balance.toLocaleString();
        }
        renderChat();
    }

    function showPage(id) {
        if(!currentUser && id !== 'shop') id = 'auth';
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'shop') renderShop();
        if(id === 'profile') renderProfile();
    }

    function logout() { sessionStorage.clear(); location.reload(); }

    renderShop();
    if(currentUser) renderProfile(); else showPage('shop');
</script>
</body>
</html>
